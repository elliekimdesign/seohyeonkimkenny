<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seohyeon Kimkenny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=JetBrains+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="grid-bg"></div>

  <main class="container">
    <!-- content rendered from kimkenny.md by JS -->
  </main>

  <!-- Structure-mode meta labels (only visible when body.structure-mode) -->
  <div class="structure-overlay" aria-hidden="true">
    <div class="meta meta-system">840 max ¬∑ 4-col</div>

    <!-- column dividers (sky verticals) -->
    <div class="meta meta-col meta-col-1">01</div>
    <div class="meta meta-col meta-col-2">02</div>
    <div class="meta meta-col meta-col-3">03</div>
    <div class="meta meta-col meta-col-4">04</div>

    <!-- horizontal rhythm label (right edge) -->
    <div class="meta meta-rhythm meta-rhythm-1">24 BASE</div>

    <!-- type info (left edge, top) -->
    <div class="meta meta-type meta-type-h1">H1 ¬∑ BOLDONSE 20/24</div>
    <div class="meta meta-type meta-type-body">BODY ¬∑ MONO 13/24</div>

    <!-- color tokens (bottom center) -->
    <div class="meta meta-tokens">
      <span><i class="sw" style="background:#6ea5c8"></i>#6ea5c8</span>
      <span><i class="sw" style="background:#e64b82"></i>#e64b82</span>
      <span><i class="sw" style="background:#1f1b18"></i>#1f1b18</span>
      <span><i class="sw" style="background:#fdfdf8;border:1px solid rgba(0,0,0,0.1)"></i>#fdfdf8</span>
    </div>
  </div>

  <!-- Inspect-mode markdown view (rendered from kimkenny.md by JS) -->
  <div class="inspect-view" aria-hidden="true">
    <div class="inspect-header">
      <span class="inspect-file">kimkenny.md</span>
      <span class="inspect-meta">UTF-8 / Markdown</span>
    </div>
    <pre class="inspect-code"><code></code></pre>
  </div>

  <!-- Mode toggle -->
  <div class="mode-toggle" role="tablist" aria-label="View mode">
    <button class="mode-btn is-active" data-mode="default" type="button">
      <span class="mode-indicator">[<i class="mode-dot"></i>]</span>
      <span class="mode-label">Default</span>
    </button>
    <button class="mode-btn" data-mode="structure" type="button">
      <span class="mode-indicator">[<i class="mode-dot"></i>]</span>
      <span class="mode-label">Structure</span>
    </button>
    <button class="mode-btn" data-mode="inspect" type="button">
      <span class="mode-indicator">[<i class="mode-dot"></i>]</span>
      <span class="mode-label">Inspect</span>
    </button>
  </div>

  <script>
    (function () {
      var body = document.body;

      /* ----- mode toggle ----- */
      var btns = document.querySelectorAll('.mode-btn');
      btns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var mode = btn.getAttribute('data-mode');
          btns.forEach(function (b) { b.classList.toggle('is-active', b === btn); });
          body.classList.toggle('structure-mode', mode === 'structure');
          body.classList.toggle('inspect-mode', mode === 'inspect');
        });
      });

      /* ----- markdown rendering from kimkenny.md ----- */

      // escape HTML special chars
      function esc(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      // inline markdown ‚Äî links + bold
      function inline(s) {
        // bold-link: **[text](url)** ‚Üí <strong><a>text</a></strong>
        s = s.replace(/\*\*\[([^\]]+)\]\(([^)]+)\)\*\*/g, function (_, text, url) {
          var attr = url === '#' ? '' : ' target="_blank" rel="noopener"';
          return '<strong><a href="' + url + '"' + attr + '">' + text + '</a></strong>';
        });
        // link: [text](url)
        s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, text, url) {
          var attr = (url === '#' || url.startsWith('mailto:')) ? '' : ' target="_blank" rel="noopener"';
          return '<a href="' + url + '"' + attr + '">' + text + '</a>';
        });
        // bold: **text**
        s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        return s;
      }

      // parse markdown into structured sections for the portfolio render
      // structure: { intro, sections: [{ id, title, subLabel?, items: [{title, desc, earlier}] }] , contact }
      function parseMd(md) {
        var lines = md.split('\n');
        var data = { intro: { title: '', tagline: '' }, sections: [], contact: null };
        var i = 0;
        var section = null;
        var inEarlier = false;

        while (i < lines.length) {
          var line = lines[i];

          // h1 ‚Äî intro title
          if (/^#\s+/.test(line)) {
            data.intro.title = line.replace(/^#\s+/, '').trim();
            // next non-empty line is tagline (may span multiple lines until blank)
            i++;
            while (i < lines.length && lines[i].trim() === '') i++;
            var tag = '';
            while (i < lines.length && lines[i].trim() !== '' && !/^#/.test(lines[i]) && !/^---/.test(lines[i])) {
              tag += (tag ? ' ' : '') + lines[i].trim();
              i++;
            }
            data.intro.tagline = tag;
            continue;
          }

          // hr
          if (/^---\s*$/.test(line)) { i++; continue; }

          // h2 ‚Äî start a new section
          if (/^##\s+/.test(line)) {
            var title = line.replace(/^##\s+/, '').trim();
            section = { title: title, subLabel: null, items: [] };
            data.sections.push(section);
            inEarlier = false;
            // contact section is special
            if (/^contact$/i.test(title)) {
              data.contact = { line: '', links: [] };
              i++;
              // capture contact line + links
              while (i < lines.length && !/^---\s*$/.test(lines[i]) && !/^##\s+/.test(lines[i])) {
                var cl = lines[i].trim();
                if (cl && !cl.startsWith('#') && !data.contact.line && !cl.startsWith('[')) {
                  data.contact.line = cl;
                } else if (cl.includes('[')) {
                  // parse contact links: [Email](mailto:...) ¬∑ [LinkedIn](#)
                  var re = /\[([^\]]+)\]\(([^)]+)\)/g;
                  var m;
                  while ((m = re.exec(cl)) !== null) {
                    data.contact.links.push({ text: m[1], url: m[2] });
                  }
                }
                i++;
              }
              continue;
            }
            i++;
            continue;
          }

          // h3 ‚Äî sub-label (e.g., Earlier)
          if (/^###\s+/.test(line)) {
            if (section) section.subLabel = line.replace(/^###\s+/, '').trim();
            inEarlier = true;
            i++;
            continue;
          }

          // list item: - **[text](url)** ‚Äî desc   OR   - text ‚Äî desc
          var li = line.match(/^-\s+(.+)$/);
          if (li && section) {
            var rest = li[1];
            // try bold-link form: **[title](url)** ‚Äî desc
            var m = rest.match(/^\*\*\[([^\]]+)\]\(([^)]+)\)\*\*\s*[‚Äî-]\s*(.+)$/);
            if (m) {
              section.items.push({ title: m[1], url: m[2], desc: m[3], earlier: inEarlier });
            } else {
              // plain form: title ‚Äî desc
              var m2 = rest.match(/^([^‚Äî\-]+?)\s*[‚Äî-]\s*(.+)$/);
              if (m2) {
                section.items.push({ title: m2[1].trim(), url: '#', desc: m2[2].trim(), earlier: inEarlier });
              }
            }
            i++;
            continue;
          }

          i++;
        }

        return data;
      }

      // render parsed data into the .container (default/structure modes)
      function renderPortfolio(data) {
        var c = document.querySelector('main.container');
        if (!c) return;
        var html = '';

        // intro
        html += '<section class="intro">';
        html += '<h1>' + esc(data.intro.title) + '</h1>';
        html += '<p class="tagline">' + inline(esc(data.intro.tagline)) + '</p>';
        html += '</section>';

        // sections (excluding contact, which we render last)
        data.sections.forEach(function (s) {
          if (data.contact && /^contact$/i.test(s.title)) return;
          html += '<hr />';
          html += '<section class="block">';
          html += '<div class="block-label">' + esc(s.title) + '</div>';
          if (s.subLabel) {
            html += '<div class="block-label sub-label">' + esc(s.subLabel) + '</div>';
          }
          html += '<ul class="items">';
          s.items.forEach(function (it) {
            var titleClass = 'item-title' + (it.earlier ? ' earlier-item' : '');
            var isInternal = it.url === '#' || it.url.endsWith('.html') || it.url.startsWith('/');
            var attr = isInternal ? '' : ' target="_blank" rel="noopener"';
            html += '<li><a href="' + it.url + '"' + attr + '">';
            html += '<span class="' + titleClass + '">' + esc(it.title) + '</span>';
            html += '<span class="item-desc">' + esc(it.desc) + '</span>';
            html += '</a></li>';
          });
          html += '</ul></section>';
        });

        // contact
        if (data.contact) {
          html += '<hr />';
          html += '<section class="block contact">';
          html += '<div class="block-label">Contact</div>';
          html += '<div class="contact-content">';
          html += '<p class="contact-line">' + esc(data.contact.line) + '</p>';
          html += '<ul class="contact-links">';
          data.contact.links.forEach(function (lk) {
            var attr = (lk.url === '#' || lk.url.startsWith('mailto:')) ? '' : ' target="_blank" rel="noopener"';
            html += '<li><a href="' + lk.url + '"' + attr + '">' + esc(lk.text) + '</a></li>';
          });
          html += '</ul></div></section>';
        }

        c.innerHTML = html;
      }

      // render raw markdown into the inspect view with line numbers + syntax tints
      function renderInspect(md) {
        var code = document.querySelector('.inspect-code code');
        if (!code) return;
        var lines = md.split('\n');
        var html = '';
        lines.forEach(function (raw, idx) {
          var n = String(idx + 1).padStart(2, ' ');
          var line = raw;
          var cls = '';
          if (/^#\s+/.test(line)) cls = 'md-h1';
          else if (/^##\s+/.test(line)) cls = 'md-h2';
          else if (/^###\s+/.test(line)) cls = 'md-h3';
          else if (/^---\s*$/.test(line)) cls = 'md-hr';

          // escape html in the raw line first
          var escLine = esc(line);

          // inline tints ‚Äî color **bold-link** and [link](url) parts
          escLine = escLine.replace(/\*\*\[[^\]]+\]\([^)]+\)\*\*/g, function (m) {
            return '<span class="md-strong">' + m + '</span>';
          });
          escLine = escLine.replace(/(?<!\*)\[[^\]]+\]\([^)]+\)/g, function (m) {
            return '<span class="md-link">' + m + '</span>';
          });

          var content = cls ? '<span class="' + cls + '">' + escLine + '</span>' : escLine;
          html += '<span class="ln">' + n + '</span>' + content + '\n';
        });
        code.innerHTML = html;
      }

      // fetch the markdown source and render both views
      fetch('kimkenny.md', { cache: 'no-cache' })
        .then(function (r) {
          if (!r.ok) throw new Error('Failed to load kimkenny.md');
          return r.text();
        })
        .then(function (md) {
          var data = parseMd(md);
          renderPortfolio(data);
          renderInspect(md);
        })
        .catch(function (err) {
          var c = document.querySelector('main.container');
          if (c) c.innerHTML = '<section class="intro"><h1>Loading‚Ä¶</h1><p class="tagline">If this persists, this site needs to be served over http (not file://).</p></section>';
          console.error(err);
        });
    })();
  </script>
</body>
</html>
